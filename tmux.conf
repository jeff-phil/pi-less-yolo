set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -g mouse on
set -g history-limit 100000
set -g extended-keys on
set -g extended-keys-format csi-u
set -g display-time 4000
set -g focus-events on
setw -g aggressive-resize on
set -g pane-border-status top
set -g pane-border-format " [ #{session_name} : #{pane_title} ] "

# Faster escape handling (important for vim/emacs users)
set -s escape-time 0

set -g status-keys emacs

# --- Prefix ---
#unbind C-b
#set -g prefix C-a
#bind C-a send-prefix

# --- Splits ---
bind | split-window -h
bind \\ split-window -v
#unbind '"'
#unbind %

# Open splits in current pane's directory
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -v -c "#{pane_current_path}"

# --- Pane navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind C-n select-pane -R
bind C-v select-pane -U

# Resize panes with Shift + hjkl
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Show the pane number in pane
bind -n M-q display-panes -d 400

# Popup scratch
#bind-key s display-popup -E "tmux new-session -A -s scratch"
#bind-key Escape detach-client -s scratch
## Toggle popup
bind-key C-b if-shell -F '#{==:#{session_name},scratch}' \
  'detach-client' \
  'run-shell "tmux has-session -t scratch 2>/dev/null || (tmux new-session -d -s scratch -n scratch && tmux select-pane -t scratch: -T scratch)" ; display-popup -E -w 100% -h 35% -x C -y P "tmux attach-session -t scratch"'

# Toggle scratch in own window... create if doesn't exist - this is for better text copying
bind-key b run-shell "tmux has-session -t scratch 2>/dev/null || (tmux new-session -d -s scratch -n scratch)" \; \
  if-shell 'tmux list-panes -F "##{pane_title}" | grep -q "^scratch$"' \
    'run-shell "tmux select-pane -t $(tmux list-panes -F \"##{pane_title} ##{pane_id}\" | grep \"^scratch \" | cut -d\" \" -f2); tmux break-pane -d -t scratch -n scratch && tmux kill-window -t scratch:1"' \
    'join-pane -s scratch:scratch; select-pane -T "scratch"; new-session -d -s scratch'

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# --- Status bar ---
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 100

set -g status-left "#[bold]#S "
set -g status-right "#[fg=green]%Y-%m-%d #[fg=cyan]%H:%M "

# --- Better colors ---
set -g mode-style "bg=#44475a,fg=#f8f8f2"
set -g message-style "bg=#44475a,fg=#f8f8f2"

# --- Copy mode (vi-style) ---
setw -g mode-keys vi

# Use system clipboard (macOS / Linux with xclip or wl-copy)
#bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -selection clipboard || wl-copy"

# --- Window numbering ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- Activity monitoring ---
setw -g monitor-activity on
set -g visual-activity off

# --- Fix for nested tmux / ssh ---
set -g allow-rename off

# Dracula palette
set -g status-bg "#282a36"
set -g status-fg "#f8f8f2"

set -g pane-border-style fg="#44475a"
set -g pane-active-border-style fg="#bd93f9"

set -g message-style bg="#44475a",fg="#f8f8f2"

set -g status-left "#[fg=#bd93f9,bold]#S "
set -g status-right "#[fg=#50fa7b]%Y-%m-%d #[fg=#8be9fd]%H:%M "

setw -g window-status-format "#[fg=#6272a4] #I:#W "
setw -g window-status-current-format "#[fg=#f8f8f2,bg=#44475a,bold] #I:#W "

set -g window-style 'bg=#1e2029'
set -g window-active-style 'bg=#111217'

# Show window count
#set -g status-right 'Window #I/#{session_windows} | %H:%M -- %D'
set -g status-right '#[fg=#f8f8f2,bg=#44475a,bold]Host: #[fg=#bd93f9]#H#[fg=#50fa7b,bg=#282a36,nobold] #{session_windows}w #[fg=#ff79c6]#{window_panes}p #[fg=#f1fa8c]%H:%M #[fg=#6272a4]%Y-%m-%d'

# Show list of all windows always
set -g status-justify left

# Plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'
# when running pi container, let's save sessions in connected space
if-shell '[ -d "/pi-agent" ]' \
  'set -g @resurrect-dir "/pi-agent/tmux-sessions"' \
  'set -g @resurrect-dir "~/.tmux/saved-sessions"'

set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @plugin 'tmux-plugins/tmux-logging'
if-shell '[ -d "/pi-agent" ]' \
  'set -g @logging-path "/pi-agent/tmux-sessions"; set -g @save-complete-history-path "/pi-agent/tmux-sessions"; set -g @screen-capture-path "/pi-agent/tmux-sessions"' \
  'set -g @logging-path "~/.tmux/saved-sessions"; set -g @save-complete-history-path "~/.tmux/saved-sessions"; set -g @screen-capture-path "~/.tmux/saved-sessions"'

# Initialize tpack (keep this line at the very bottom of tmux.conf)
# NOTE: This is new replacement for tpm, don't use tpm
run 'tpack init'
